[dependency-groups]
runtime = [
    "httpx>=0.28,<1",
    "pandas>=2.3,<3",
]
dev = [
    "pytest>=8.0,<9",
    "ruff>=0.12,<1",
]

[tool.uv]
package = false

[tool.ruff]
line-length = 100
target-version = "py314"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["python/src"]
