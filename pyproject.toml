[dependency-groups]
runtime = [
    "httpx>=0.28,<1",
    "pandas>=2.3,<3",
]
dev = [
    "pytest>=8.0,<9",
    "pytest-cov>=6.0,<7",
    "ruff>=0.12,<1",
]

[tool.coverage.run]
source = ["trading_system"]
branch = true
omit = ["*/tests/*", "*/.venv/*", "*/__pycache__/*"]

[tool.coverage.report]
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
]
fail_under = 50

[tool.coverage.html]
directory = "htmlcov"

[tool.uv]
package = false

[tool.ruff]
line-length = 100
target-version = "py314"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["python/src"]
