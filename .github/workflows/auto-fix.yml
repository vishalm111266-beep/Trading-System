name: Auto-Fix

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    if: github.actor != 'github-autopilot[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install tools
        run: |
          pip install ruff black autoflake

      - name: Auto-fix linting
        run: |
          ruff check . --fix --exit-zero
          black . --quiet || true
          autoflake --in-place --remove-all-unused-imports --recursive . || true

      - name: Fix Python import sorting
        run: |
          pip install reorder-python-imports
          find . -name "*.py" -not -path "./.opencode/node_modules/*" -exec reorder-python-imports {} \; 2>/dev/null || true

      - name: Commit fixes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "🤖 auto-fix: linting and formatting"
          commit_user_name: "github-autopilot[bot]"
          commit_user_email: "github-autopilot[bot]@users.noreply.github.com"
          branch: ${{ github.head_ref || github.ref }}
